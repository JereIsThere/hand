# nginx-Site für Die Hand. Ziel: /etc/nginx/sites-available/hand
# Reverse-Proxy auf den lokalen Express-Server (Port 3737).
#
#   sudo cp deploy/nginx-hand.conf /etc/nginx/sites-available/hand
#   sudo ln -s /etc/nginx/sites-available/hand /etc/nginx/sites-enabled/hand
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d hand.jeremias-groehl.de   # fügt den 443-Block + Redirect hinzu

server {
    listen 80;
    listen [::]:80;
    server_name hand.jeremias-groehl.de;   # <-- ggf. anpassen

    location / {
        proxy_pass http://127.0.0.1:3737;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # für später: SSE/Streaming (sprecher) + lange Antworten
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    client_max_body_size 12m;   # Attachments / Bild-Uploads im Chat
}
