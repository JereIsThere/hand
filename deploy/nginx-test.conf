# Die Hand — DEV/Test-Instanz auf eigener Subdomain.
# Reverse-Proxy auf den Dev-Server (Port 3001). HTTP only; certbot danach:
#   sudo certbot --nginx -d test.jeremias-groehl.de
#
#   sudo cp deploy/nginx-test.conf /etc/nginx/sites-available/hand-test
#   sudo ln -s /etc/nginx/sites-available/hand-test /etc/nginx/sites-enabled/hand-test
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name test.jeremias-groehl.de;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    client_max_body_size 12m;
    access_log /var/log/nginx/hand-test-access.log;
    error_log  /var/log/nginx/hand-test-error.log;
}
