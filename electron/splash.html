<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8"/>
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:#06000e;color:#e8e0f0;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    height:100vh;user-select:none;-webkit-app-region:drag;
    overflow:hidden;
  }
  .sigil{font-size:52px;margin-bottom:14px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{opacity:.7;transform:scale(1)}50%{opacity:1;transform:scale(1.05)}}
  h1{font-family:Georgia,serif;font-size:22px;font-weight:700;
     background:linear-gradient(90deg,#00d4c8,#d4a200);
     -webkit-background-clip:text;-webkit-text-fill-color:transparent;
     margin-bottom:6px;}
  .tag{font-size:11px;color:#6f6488;letter-spacing:2px;text-transform:uppercase;margin-bottom:32px;}
  .dots{display:flex;gap:6px;}
  .dot{width:6px;height:6px;border-radius:50%;background:#2a1d44;animation:blink 1.2s ease-in-out infinite;}
  .dot:nth-child(2){animation-delay:.2s;}
  .dot:nth-child(3){animation-delay:.4s;}
  @keyframes blink{0%,80%,100%{background:#2a1d44}40%{background:#00d4c8}}
  .status{position:absolute;bottom:20px;font-size:11px;color:#3a2d54;}
</style>
</head>
<body>
  <div class="sigil">✋</div>
  <h1>Die Hand</h1>
  <div class="tag">tool-shell · startet</div>
  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
  <div class="status" id="status">server bootet…</div>
  <script>
    // Status vom Main-Prozess empfangen
    const { ipcRenderer } = require('electron');
    ipcRenderer.on('splash-status', (e, msg) => {
      document.getElementById('status').textContent = msg;
    });
  </script>
</body>
</html>
